name: lsfMonitor CI/CD

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax compile check
        run: |
          python -m compileall monitor memPrediction lsfmon.py tests/manual_verify_recent_changes.py

  build-verify:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies (requirements first, CI-safe fallback)
        run: |
          set -e
          python -m pip install --upgrade pip

          # Try project requirements first.
          # Some legacy packages may be unavailable on py3.12/ubuntu in CI,
          # so fallback to a minimal CI runtime set.
          if [ -f requirements.txt ] && python -m pip install -r requirements.txt; then
            echo "Installed dependencies from requirements.txt"
          else
            echo "::warning::requirements.txt install failed in CI, using minimal dependency set."
            python -m pip install pandas pyyaml tabulate pytest pytest-cov
          fi
      - name: Verify install and core entry help
        env:
          LSFMONITOR_INSTALL_PATH: ${{ github.workspace }}
        run: |
          python install.py -h
          python monitor/bin/bsample.py -h
      - name: Runtime behavior dry-run verification (stdlib only)
        env:
          LSFMONITOR_INSTALL_PATH: ${{ github.workspace }}
          HOME: ${{ github.workspace }}
        run: |
          python tests/manual_verify_recent_changes.py

  test:
    runs-on: ubuntu-latest
    needs: build-verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests (pytest preferred, fallback to manual verifier)
        env:
          LSFMONITOR_INSTALL_PATH: ${{ github.workspace }}
          HOME: ${{ github.workspace }}
        run: |
          set -e

          if python -c "import pytest"; then
            pytest -q
          else
            echo "::warning::pytest environment unavailable, fallback to manual verification script."
            python tests/manual_verify_recent_changes.py
          fi

  deploy-dry-run:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Create release artifact (dry-run)
        run: |
          tar -czf lsfMonitor-${{ github.sha }}.tar.gz .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsfMonitor-${{ github.sha }}
          path: lsfMonitor-${{ github.sha }}.tar.gz

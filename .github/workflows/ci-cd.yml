name: lsfMonitor CI/CD

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax compile check
        run: |
          python -m compileall monitor memPrediction

  build-verify:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify install and core entry help
        env:
          LSFMONITOR_INSTALL_PATH: ${{ github.workspace }}
        run: |
          python install.py -h
          python monitor/bin/bsample.py -h

  test:
    runs-on: ubuntu-latest
    needs: build-verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
      - name: Run tests
        run: |
          pytest -q

  deploy-dry-run:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Create release artifact (dry-run)
        run: |
          tar -czf lsfMonitor-${{ github.sha }}.tar.gz .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsfMonitor-${{ github.sha }}
          path: lsfMonitor-${{ github.sha }}.tar.gz
